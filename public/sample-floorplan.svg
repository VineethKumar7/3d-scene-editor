<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f5f5f5"/>
  
  <!-- Grid (1m = 50px) -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#ddd" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#grid)"/>
  
  <!-- Outer Walls (10m x 8m apartment) -->
  <rect x="100" y="100" width="500" height="400" fill="none" stroke="#333" stroke-width="8"/>
  
  <!-- Living Room / Kitchen divider -->
  <line x1="350" y1="100" x2="350" y2="300" stroke="#333" stroke-width="6"/>
  
  <!-- Bedroom wall -->
  <line x1="100" y1="300" x2="350" y2="300" stroke="#333" stroke-width="6"/>
  
  <!-- Bathroom walls -->
  <line x1="450" y1="100" x2="450" y2="250" stroke="#333" stroke-width="6"/>
  <line x1="450" y1="250" x2="600" y2="250" stroke="#333" stroke-width="6"/>
  
  <!-- Doors (gaps in walls) -->
  <!-- Living room door -->
  <line x1="200" y1="300" x2="280" y2="300" stroke="#f5f5f5" stroke-width="8"/>
  <path d="M 200 300 Q 200 340 240 340" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="4"/>
  
  <!-- Bathroom door -->
  <line x1="450" y1="160" x2="450" y2="230" stroke="#f5f5f5" stroke-width="8"/>
  <path d="M 450 230 Q 410 230 410 190" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="4"/>
  
  <!-- Kitchen door -->
  <line x1="350" y1="150" x2="350" y2="220" stroke="#f5f5f5" stroke-width="8"/>
  
  <!-- Main entrance -->
  <line x1="500" y1="500" x2="580" y2="500" stroke="#f5f5f5" stroke-width="10"/>
  <rect x="500" y="495" width="80" height="10" fill="#8B4513"/>
  
  <!-- Windows -->
  <line x1="150" y1="100" x2="250" y2="100" stroke="#4da6ff" stroke-width="4"/>
  <line x1="400" y1="100" x2="430" y2="100" stroke="#4da6ff" stroke-width="4"/>
  <line x1="520" y1="100" x2="580" y2="100" stroke="#4da6ff" stroke-width="4"/>
  <line x1="100" y1="350" x2="100" y2="450" stroke="#4da6ff" stroke-width="4"/>
  
  <!-- Room Labels -->
  <text x="180" y="420" font-family="Arial" font-size="20" fill="#666">BEDROOM</text>
  <text x="180" y="200" font-family="Arial" font-size="20" fill="#666">LIVING</text>
  <text x="400" y="200" font-family="Arial" font-size="20" fill="#666">KITCHEN</text>
  <text x="480" y="180" font-family="Arial" font-size="16" fill="#666">BATH</text>
  <text x="400" y="400" font-family="Arial" font-size="20" fill="#666">HALLWAY</text>
  
  <!-- Dimensions -->
  <text x="300" y="80" font-family="Arial" font-size="14" fill="#999" text-anchor="middle">10.0 m</text>
  <text x="70" y="300" font-family="Arial" font-size="14" fill="#999" text-anchor="middle" transform="rotate(-90 70 300)">8.0 m</text>
  
  <!-- Scale indicator -->
  <line x1="650" y1="550" x2="700" y2="550" stroke="#333" stroke-width="2"/>
  <line x1="650" y1="545" x2="650" y2="555" stroke="#333" stroke-width="2"/>
  <line x1="700" y1="545" x2="700" y2="555" stroke="#333" stroke-width="2"/>
  <text x="675" y="540" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">1m</text>
  
  <!-- North arrow -->
  <polygon points="750,50 745,70 750,65 755,70" fill="#333"/>
  <text x="750" y="85" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">N</text>
</svg>